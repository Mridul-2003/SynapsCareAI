version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: apis/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .envcd
    volumes:
      - ./backend/apis:/app
    restart: unless-stopped

  main:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - api
    restart: unless-stopped
