services:
  api:
    image: mridul65888/synapscaretranscript-api:latest # (abhi same rehne de)
    container_name: transcript_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  main:
    image: ajay308/synapscare-backend:latest # 🔥 tera backend
    container_name: soap_api
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    image: ajay308/synapscare-frontend:latest # 🔥 tera frontend
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - ./front/.env
    depends_on:
      - api
      - main
    restart: unless-stopped
