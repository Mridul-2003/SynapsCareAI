version: "3.9"

services:
  api:
    image: mridul65888/transcript-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  main:
    image: mridul65888/soap_notes-api:latest
    ports:
      - "8001:8001"
    env_file:
      - main.env
    restart: unless-stopped

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped
