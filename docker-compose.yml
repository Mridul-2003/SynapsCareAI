services:
  api:
    image: mridul65888/synapscaretranscript-api:latest
    container_name: transcript_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  main:
    image: mridul65888/synapscaresoap-api:latest
    container_name: soap_api
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    image: mridul65888/synaoscareai-ui:latest
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - ./front/.env
    depends_on:
      - api
      - main
    restart: unless-stopped
