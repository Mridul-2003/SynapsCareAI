version: "3.9"

services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

  api:
    build:
      context: ./backend/apis
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: apis/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .envcd
    volumes:
      - ./backend/apis:/app
    restart: unless-stopped

  main:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - api
    restart: unless-stopped
