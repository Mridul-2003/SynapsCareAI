name: Fullstack CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:

# ✅ Global permissions for GHCR
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ajay-308 # ✅ FIXED (lowercase)

jobs:
  # 🧪 TEST FRONTEND
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Test Frontend
        working-directory: ./front
        run: |
          npm install
          npm run lint
          npm test

  # 🧪 TEST BACKEND
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

  # 🐳 BUILD & PUSH IMAGES
  build:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ GHCR LOGIN
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 Backend Image
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/synapscare-backend:latest

      # 🔥 Frontend Image
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/synapscare-frontend:latest

  # 🚀 DEPLOY
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            echo "🚀 Deploying..."

            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            echo "📥 Pull latest images"
            docker pull ghcr.io/ajay-308/synapscare-backend:latest
            docker pull ghcr.io/ajay-308/synapscare-frontend:latest

            echo "🛑 Stopping old containers"
            docker-compose down || true

            echo "▶️ Starting containers"

            docker-compose up -d

            echo "✅ Deployment completed"
