name: Fullstack CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  # 🧪 TEST FRONTEND
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Test Frontend
        run: |
          cd front
          npm install
          npm run lint
          npm test

  # 🧪 TEST BACKEND
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install & Test Backend
        run: |
          cd backend
          pip install -r requirements.txt

  # 🐳 BUILD & PUSH IMAGES
  build:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    # ✅ Permission add kiya
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 Backend image
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/ajay308/synapscare-backend:latest

      # 🔥 Frontend image
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ghcr.io/ajay308/synapscare-frontend:latest

  # 🚀 DEPLOY USING DOCKER-COMPOSE
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            echo "🚀 Deploying..."

            cd /home/ubuntu/app || mkdir -p /home/ubuntu/app && cd /home/ubuntu/app

            echo "📥 Pull latest images"
            docker pull ghcr.io/ajay308/synapscare-backend:latest
            docker pull ghcr.io/ajay308/synapscare-frontend:latest

            echo "🛑 Stop old containers"
            docker-compose down || true

            echo "▶️ Start new containers"
            docker-compose up -d

            echo "✅ Deployment done"
